<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Absensi IoT</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; text-align: center; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    
    /* Gaya untuk kartu yang terdaftar */
    .card { background: #e3f2fd; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 5px solid #2196f3; text-align: left; }
    
    /* Gaya untuk kartu yang TIDAK terdaftar */
    .card.unknown { background: #ffebee; border-left-color: #f44336; }
    
    h1 { color: #333; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Dashboard Absensi Karyawan</h1>
    <p>Live Update dari Wokwi & Firebase</p>
    
    <div id="log-absen">
      <p>Memuat data...</p>
    </div>
  </div>

  <script>
    // 1. PASTIKAN URL FIREBASE KAMU BENAR (berakhiran /absensi.json)
    const firebaseURL = "https://rfid-system-laundry-default-rtdb.asia-southeast1.firebasedatabase.app/absensi.json";

    // 2. DATABASE LOKAL: Mapping UID ke Nama User
    // Kamu bisa menambahkan UID kartu baru di sini nanti
    const dataPegawai = {
      "01020304": "Ahmad",       // UID dari kodemu sebelumnya
      "A1B2C3D4": "Siti Aminah", // Contoh UID lain
      "F9E8D7C6": "Budi Santoso" // Contoh UID lain
    };

    async function ambilDataFirebase() {
      try {
        const response = await fetch(firebaseURL);
        const data = await response.json();
        
        const container = document.getElementById("log-absen");
        let htmlContent = "";

        if (data) {
          // Ubah data object dari Firebase menjadi array
          const dataArray = Object.keys(data).map(key => ({
            id: key,
            ...data[key]
          }));

          // Balik urutan agar yang terbaru ada di atas
          dataArray.reverse().forEach(item => {
            
            // Mengecek apakah UID dari Firebase ada di 'dataPegawai'
            const namaUser = dataPegawai[item.uid];
            
            if (namaUser) {
              // Tampilan jika UID TERDAFTAR
              htmlContent += `
                <div class="card">
                  <strong style="font-size: 1.2em;">👤 ${namaUser}</strong> <br>
                  <small>UID Kartu: ${item.uid}</small> <br>
                  <small style="color: #2e7d32; font-weight: bold;">✓ Berhasil Absen</small>
                </div>
              `;
            } else {
              // Tampilan jika UID TIDAK TERDAFTAR
              htmlContent += `
                <div class="card unknown">
                  <strong style="font-size: 1.2em; color: #c62828;">⚠️ User Tidak Dikenal</strong> <br>
                  <small>UID Kartu: ${item.uid}</small> <br>
                  <small style="color: #c62828; font-weight: bold;">✕ Kartu Belum Terdaftar di Sistem</small>
                </div>
              `;
            }
          });
        } else {
          htmlContent = "<p>Belum ada data absensi yang masuk hari ini.</p>";
        }

        container.innerHTML = htmlContent;
      } catch (error) {
        console.error("Gagal mengambil data:", error);
      }
    }

    // Refresh data otomatis setiap 2 detik
    setInterval(ambilDataFirebase, 2000);
    ambilDataFirebase(); 
  </script>

</body>
</html>
